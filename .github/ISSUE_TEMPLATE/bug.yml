
name: Bug report
description: Report a defect
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Clear description of the defect
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps, input data, and environment
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs / screenshots
