name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libopengl0

      - name: Install uv
        run: |
          python -m pip install -U pip uv

      - name: Install deps (uv)
        run: |
          uv sync --dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck (mypy)
        run: |
          uv run mypy . || true

      - name: Tests (headless)
        run: |
          xvfb-run -a uv run pytest -q