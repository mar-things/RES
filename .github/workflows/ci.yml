
name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1 libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libopengl0

      - name: Install tools
        run: |
          python -m pip install -U pip uv ruff mypy pytest

      - name: Install project deps
        run: |
          if [ -f pyproject.toml ]; then
            uv pip install -e ".[dev]" || uv pip install -e .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
            if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          else
            echo "No pyproject.toml or requirements.txt found" && exit 1
          fi

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Typecheck (best-effort)
        run: mypy . || true

      - name: Tests (headless)
        run: xvfb-run -a pytest -q
